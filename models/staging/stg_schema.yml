version: 2

models:
  - name: stg_tumo_raw_us__AF_events
    description: "Cleaned and casted staging table containing self-training session logs. Granularity: one row per student exercise attempt."
    columns:
      - name: act_id
        description: "The primary key for this table, uniquely identifying a student's activity attempt."
        tests:
          - unique
          - not_null
      - name: user_id
        description: "Foreign key linking to the student registry."
        tests:
          - not_null
      - name: try_status
        description: "The evaluation status of the self-training attempt."
        tests:
          - accepted_values:
              arguments :
                values: ['Awarded', 'Working', 'Rejected']

  - name: stg_tumo_raw_us__AF_jira_tickets
    description: "Staging table containing IT support and software bug tickets submitted from European centers. Granularity: one row per support ticket."
    columns:
      - name: ticket_id
        description: "The primary key for this table (Format: JIRA-XXXX)."
        tests:
          - unique
          - not_null
      - name: priority
        description: "The urgency level assigned to the ticket."
        tests:
          - accepted_values:
              arguments :
                values: ['Low', 'Medium', 'High']

  - name: stg_tumo_raw_us__AF_list
    description: "Staging reference table of available self-training activities and their baseline technical benchmarks."
    columns:
      - name: activity
        description: "The primary key for this reference table."
        tests:
          - unique
          - not_null
      - name: activity_name_en_fr
        description: "Foreign key linking to the student registry."
        tests:
          - not_null

  - name: stg_tumo_raw_us__Center_activity_daily_status
    description: "Staging table aggregating operational metrics per training center on a daily basis. Granularity: one row per date and status."
    tests:
      - unique:
          arguments:
            column_name: "(date || '-' || status)"
    columns:
      - name: date
        description: "The operational log date."
        tests:
          - not_null
      - name: status
        description: "The operational center status (e.g., Active)."
        tests:
          - not_null

  - name: stg_tumo_raw_us__LAB_events
    description: "Staging table logging attendance and completion updates during guided workshop sessions (Labs)."
    columns:
      - name: lesson_id
        description: "The primary key identifying a unique workshop event or attendance log."
        tests:
          - unique
          - not_null

  - name: stg_tumo_raw_us__LAB_satisfaction_enriched
    description: "Enriched staging table of end-of-lab satisfaction surveys. Granularity: one row per timestamp, workshop level, and workshop topic."
    columns:
      - name: satisfaction_id
        description: "The primary key identifying a unique satisfaction survey return"
        tests:
          - unique
          - not_null
      - name: timestamp_comment
        description: "The BigQuery native format timestamp when the survey was submitted."
        tests:
          - not_null
      - name: satisfaction_on_5
        description: "The mandatory rating score left by the student."
        tests:
          - not_null

  - name: stg_tumo_raw_us__Student_list_info_performance
    description: "Staging master registry containing student profiles, registration dates, and baseline performance scores."
    columns:
      - name: user_id
        description: "The primary key uniquely identifying a student within the ecosystem."
        tests:
          - unique
          - not_null
      - name: tumo_id
        description: "The primary key uniquely identifying a student within the ecosystem."
        tests:
          - unique
          - not_null